name: Build, Test, and Push Staging Image to DockerHub

on:
  push:
    branches:
      - staging

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install dependencies
        run: |
          cd app
          npm install

      - name: Run Tests
        run: |
          cd app
          npm test

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set Git SHA
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build Image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/credpal-app-staging:$TAG \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/credpal-app-staging:latest .

      - name: Push Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/credpal-app-staging:$TAG
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/credpal-app-staging:latest

  deploy-infra:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          cd terraform
          terraform init

      - name: Terraform Plan
        id: plan
        run: |
          cd terraform
          terraform plan -detailed-exitcode \
            -var-file=staging.tfvars \
            -var="docker_image=${{ secrets.DOCKERHUB_USERNAME }}/credpal-app-staging:${{ env.TAG }}" \
            || echo "exit_code=$?" >> plan_status.txt

      - name: Set plan status
        id: set-plan
        run: |
          if [ -f terraform/plan_status.txt ]; then
            export PLAN_EXIT=$(cat terraform/plan_status.txt | grep exit_code | cut -d'=' -f2)
          else
            export PLAN_EXIT=0
          fi
          echo "PLAN_EXIT=$PLAN_EXIT" >> $GITHUB_ENV

      - name: Terraform Apply (if changes)
        if: env.PLAN_EXIT == '2'
        run: |
          cd terraform
          terraform apply -auto-approve \
            -var-file=staging.tfvars \
            -var="docker_image=${{ secrets.DOCKERHUB_USERNAME }}/credpal-app-staging:${{ env.TAG }}"

      - name: Skip Apply (no changes)
        if: env.PLAN_EXIT == '0'
        run: echo "No infrastructure changes, skipping Terraform apply."
